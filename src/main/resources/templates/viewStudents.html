<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>View Students</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:Poppins;
    background:#0f1117;
    color:white;
    padding:40px;
}

.container{
    max-width:1100px;
    margin:auto;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    background:#1c1f2b;
    border-radius:12px;
    margin-bottom:30px;
    box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.logo{
    font-size:20px;
    font-weight:600;
    color:#5b5bff;
}

.nav-links a{
    margin:0 15px;
    text-decoration:none;
    color:#ccc;
}

.nav-links a:hover{
    color:white;
}

.nav-right{
    display:flex;
    align-items:center;
    gap:15px;
}

.nav-right input{
    padding:8px 12px;
    border-radius:8px;
    border:none;
    background:#2a2e3d;
    color:white;
}

.logout{
    padding:8px 14px;
    background:#ff4d4d;
    color:white;
    border-radius:6px;
    text-decoration:none;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    background:#1c1f2b;
    border-radius:12px;
    overflow:hidden;
}

th,td{
    padding:14px;
    text-align:center;
}

th{
    background:#2b2f3d;
}

tr{
    border-bottom:1px solid #2f3345;
}

tr:hover{
    background:#2a2e3d;
}

/* RESULT BUTTON */
.result-btn{
    padding:6px 12px;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.result-btn:hover{
    transform:scale(1.05);
}

/* EMPTY MESSAGE */
.no-data{
    text-align:center;
    padding:20px;
    color:#aaa;
}
</style>

<script>
function searchTable(){
 let input=document.getElementById('search').value.toLowerCase();
 let rows=document.querySelectorAll('#tableBody tr');

 rows.forEach(row=>{
   let text=row.innerText.toLowerCase();
   row.style.display=text.includes(input)?'':'none';
 });
}
</script>

</head>

<body>

<div class="navbar">
 <div class="logo">SV College</div>

 <div class="nav-links">
   <a href="/dashboard">Dashboard</a>
   <a href="/viewStudents">Students</a>
 </div>

 <div class="nav-right">
   <input type="text" id="search" onkeyup="searchTable()" placeholder="Search students...">
   <a href="/" class="logout">Logout</a>
 </div>
</div>

<div class="container">

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Date of Birth</th>
<th>Course</th>
<th>Result</th>
</tr>
</thead>

<tbody id="tableBody">

<!-- 🔥 DATA LOOP -->
<tr th:each="s : ${students}">
<td th:text="${s.id}"></td>
<td th:text="${s.name}"></td>

<!-- 🔥 NULL SAFE DOB -->
<td th:text="${s.dob != null ? s.dob : 'N/A'}"></td>

<td th:text="${s.course}"></td>

<td>
    <a th:href="@{/result(id=${s.id})}">
        <button class="result-btn">View</button>
    </a>
</td>
</tr>

<!-- 🔥 IF NO DATA -->
<tr th:if="${#lists.isEmpty(students)}">
<td colspan="5" class="no-data">No Students Found</td>
</tr>

</tbody>
</table>

</div>

</body>
</html>
