<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>View Students</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{font-family:Poppins;background:#0f1117;color:white;padding:40px;}

.container{max-width:1100px;margin:auto;}

/* NAVBAR */
.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 25px;background:#1c1f2b;border-radius:12px;margin-bottom:30px;box-shadow:0 5px 20px rgba(0,0,0,0.4);}

.logo{font-size:20px;font-weight:600;color:#5b5bff;}

.nav-links a{margin:0 15px;text-decoration:none;color:#ccc;font-size:14px;position:relative;transition:0.3s;}

.nav-links a::after{content:'';position:absolute;width:0;height:2px;background:#5b5bff;left:0;bottom:-4px;transition:0.3s;}

.nav-links a:hover{color:white;}
.nav-links a:hover::after{width:100%;}

.nav-right{display:flex;align-items:center;gap:15px;}

.nav-right input{padding:8px 12px;border-radius:8px;border:none;background:#2a2e3d;color:white;outline:none;}

.logout{padding:8px 14px;background:#ff4d4d;color:white;border-radius:6px;text-decoration:none;}

/* TABLE */
table{width:100%;border-collapse:collapse;background:#1c1f2b;border-radius:12px;overflow:hidden;}

th,td{padding:14px;text-align:center;}

th{background:#2b2f3d;}

tr{border-bottom:1px solid #2f3345;}

tr:hover{background:#2a2e3d;}

/* PAGINATION */
.pagination{margin-top:20px;text-align:center;}

.btn{padding:8px 14px;margin:5px;background:#5b5bff;border:none;border-radius:6px;color:white;cursor:pointer;}

</style>

<script>
function searchTable(){
 let input=document.getElementById('search').value.toLowerCase();
 let rows=document.querySelectorAll('#tableBody tr');
 rows.forEach(row=>{
   let text=row.innerText.toLowerCase();
   row.style.display=text.includes(input)?'':'none';
 });
}

let currentPage=1;
let rowsPerPage=5;

function showPage(page){
 let rows=document.querySelectorAll('#tableBody tr');
 let start=(page-1)*rowsPerPage;
 let end=start+rowsPerPage;

 rows.forEach((row,i)=>{
   row.style.display=(i>=start && i<end)?'':'none';
 });

 currentPage=page;
}

function nextPage(){showPage(currentPage+1);}
function prevPage(){if(currentPage>1)showPage(currentPage-1);}

window.onload=function(){showPage(1);}
</script>

</head>

<body>

<div class="navbar">
 <div class="logo">SV College</div>

 <div class="nav-links">
   <a href="/dashboard">Dashboard</a>
   <a href="/viewStudents">Students</a>
 </div>

 <div class="nav-right">
   <input type="text" id="search" onkeyup="searchTable()" placeholder="Search students...">
   <a href="/" class="logout">Logout</a>
 </div>
</div>

<div class="container">

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Course</th>
<th>Marks</th>
</tr>
</thead>

<tbody id="tableBody">

<tr th:each="s : ${students}">
<td th:text="${s.id}"></td>
<td class="name" th:text="${s.name}"></td>
<td th:text="${s.age}"></td>
<td th:text="${s.course}"></td>
<td th:text="${s.marks}"></td>
</tr>

</tbody>
</table>

<div class="pagination">
<button class="btn" onclick="prevPage()">Prev</button>
<button class="btn" onclick="nextPage()">Next</button>
</div>

</div>
<script>
    const keyword = new URLSearchParams(window.location.search).get("keyword");

    if(keyword){
        const cells = document.querySelectorAll(".name");

        cells.forEach(cell => {
            let text = cell.innerText;
            let regex = new RegExp("(" + keyword + ")", "gi");

            cell.innerHTML = text.replace(regex,
                "<span style='color:#00e5ff;font-weight:bold;'>$1</span>");
        });
    }
</script>
</body>
</html>
