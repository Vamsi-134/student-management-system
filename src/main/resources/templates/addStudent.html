<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Student</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0b0f1a,#111827);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
padding:40px;
border-radius:20px;
width:400px;
box-shadow:0 15px 40px rgba(0,0,0,.5);
}

h2{
margin-bottom:20px;
text-align:center;
}

/* SUCCESS MESSAGE */
.success{
background:#22c55e;
padding:12px;
border-radius:10px;
text-align:center;
margin-bottom:15px;
font-weight:600;
}

/* ERROR MESSAGE */
.error{
background:#ef4444;
padding:12px;
border-radius:10px;
text-align:center;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(120deg,#6366f1,#4f46e5);
color:white;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(99,102,241,.4);
}

.back{
display:block;
margin-top:15px;
text-align:center;
color:#9ca3af;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Add Student</h2>

<!-- ✅ SUCCESS -->
<div th:if="${success}" class="success">
    ✔ <span th:text="${success}"></span>
</div>

<!-- ❌ ERROR -->
<div th:if="${error}" class="error">
    <span th:text="${error}"></span>
</div>

<form action="/addStudent" method="post">

<input type="text" name="id" placeholder="Enter Registered Number" required>

<input type="text" name="name" placeholder="Enter Name" required>

<input type="date" name="dob" required>

<input type="text" name="course" placeholder="Enter Course" required>

<button type="submit">Add Student</button>

</form>

<a href="/dashboard" class="back">← Back to Dashboard</a>

</div>

</body>
</html>
