<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Student</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* Background */
body{
background:linear-gradient(135deg,#0b0f1a,#111827);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* Card */
.container{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
padding:40px;
border-radius:20px;
width:400px;
box-shadow:0 15px 40px rgba(0,0,0,.5);
animation:fadeUp .6s ease;
}

/* Title */
h2{
margin-bottom:20px;
text-align:center;
}

/* Inputs */
input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
outline:none;
}

/* Button */
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(120deg,#6366f1,#4f46e5);
color:white;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(99,102,241,.4);
}

/* Back */
.back{
display:block;
margin-top:15px;
text-align:center;
color:#9ca3af;
text-decoration:none;
}

/* Animation */
@keyframes fadeUp{
0%{opacity:0; transform:translateY(20px);}
100%{opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<div class="container">

<h2>Add Student</h2>

<p th:if="${success}" style="
    background:#22c55e;
    padding:12px;
    border-radius:10px;
    text-align:center;
    margin-bottom:15px;
    color:white;
    font-weight:600;">
    ✔ <span th:text="${success}"></span>
</p>

<p th:if="${error}" style="
    background:#ef4444;
    padding:12px;
    border-radius:10px;
    text-align:center;
    margin-bottom:15px;
    color:white;">
    <span th:text="${error}"></span>
</p>
<form action="/addStudent" method="post">

<input type="number" name="id" placeholder="Enter ID" required>
<input type="text" name="name" placeholder="Enter Name" required>
<input type="number" name="age" placeholder="Enter Age" required>
<input type="text" name="course" placeholder="Enter Course" required>
<input type="number" step="0.01" name="marks" placeholder="Enter Marks" required>

<button type="submit">Add Student</button>

</form>

<a href="/dashboard" class="back">← Back to Dashboard</a>

</div>

</body>
</html>
