<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Update Marks</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
background:linear-gradient(135deg,#0b0f1a,#111827);
font-family:Poppins;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.card{
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:20px;
width:320px;
text-align:center;
backdrop-filter:blur(10px);
}

input{
width:100%;
padding:14px;
margin:15px 0;
border-radius:10px;
border:none;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(120deg,#6366f1,#4f46e5);
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(99,102,241,.4);
}
</style>
</head>

<body>

<div class="card">

<h2>Update Marks</h2>

<form th:action="@{/updateStudent}" method="post">

    <input type="hidden" name="id" th:value="${student.id}">

    <input type="number" name="marks" th:value="${student.marks}" required>

    <button type="submit">Update</button>

</form>
</div>

</body>
</html>
