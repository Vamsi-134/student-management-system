<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Search Student</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
    font-family:Poppins;
    background:#0f1117;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.container{
    background:#1c1f2b;
    padding:40px;
    border-radius:16px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
    width:350px;
}

/* TITLE */
h2{
    margin-bottom:25px;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
    background:#2a2e3d;
    color:white;
    margin-bottom:20px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4fc3f7;
    color:black;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#81d4fa;
}

/* BACK */
.back{
    display:block;
    margin-top:20px;
    color:#aaa;
    text-decoration:none;
}

.back:hover{
    color:white;
}

</style>
</head>

<body>

<div class="container">

<h2>Search Student 🔍</h2>

<form action="/search" method="get">
    <input type="text" name="keyword" placeholder="Enter student name..." required>
    <button type="submit">Search</button>
</form>

<a href="/dashboard" class="back">← Back to Dashboard</a>

</div>

</body>
</html>
